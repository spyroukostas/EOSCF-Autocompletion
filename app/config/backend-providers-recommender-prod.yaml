VERSION_NAME: "v2"
MODE: "PROVIDERS-RECOMMENDER"

FASTAPI:
  WORKERS: 1
  DEBUG: False
  RELOAD: False
  HOST: '0.0.0.0'
  PORT: 4559

SCHEDULING:
  EVERY_N_HOURS: 6

CREDENTIALS: "credentials.yml"

SPACY_MODEL: "en_core_web_sm"

SIMILAR_SERVICES:
  SENTENCE_FILTERING_METHOD: "NONE"

  METHOD: "SBERT" # tf-idf or SBERT
  SBERT:
    MODEL_NAME: 'all-MiniLM-L6-v2'
    DEVICE: "cpu"

PROJECT_COMPLETION:
  MIN_SUPPORT: 0.05
  MIN_CONFIDENCE: 0.5

AUTO_COMPLETION:
  RESOURCE_TYPES:
    service:
      TEXT_ATTRIBUTES: ["description"]
      ENUMERATED_FIELDS:
        categories:
          VOCABULARY_TYPE: "SUBCATEGORY"
          SIMILARITY_THRESHOLD: 0.5
          CONSIDERED_SERVICES_THRESHOLD: 5
          FREQUENCY_THRESHOLD: 0.1
        scientific_domains:
          VOCABULARY_TYPE: "SCIENTIFIC_SUBDOMAIN"
          SIMILARITY_THRESHOLD: 0.5
          CONSIDERED_SERVICES_THRESHOLD: 5
          FREQUENCY_THRESHOLD: 0.1
